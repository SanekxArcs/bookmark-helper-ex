<section class="space-y-4 p-4">

  <!-- API Configuration Card -->
  <div class="card p-5">
    <h2 class="text-[11px] font-bold uppercase tracking-[0.15em] flex items-center gap-2 mb-5"
      style="color:#888;">
      <i data-lucide="key-round" class="w-3 h-3 text-accent"></i> API Configuration
    </h2>

    <div class="space-y-4">

      <!-- API Key Input -->
      <div>
        <label for="apiKey"
          class="block text-[10px] font-bold uppercase tracking-[0.15em] mb-1.5"
          style="color:#555;">
          Gemini API Key
        </label>
        <div class="relative">
          <input type="password" id="apiKey"
            class="w-full rounded-lg px-3 py-2.5 text-sm font-mono focus-ring"
            style="background:#161616;border:1px solid #242424;color:#f0f0f0;padding-right:2.5rem;"
            placeholder="Enter your API key here..." />
          <button id="toggleApiKey"
            class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center justify-center h-7 w-7 rounded-md transition-colors"
            style="color:#444;"
            onmouseover="this.style.color='#888'" onmouseout="this.style.color='#444'">
            <i data-lucide="eye" class="w-4 h-4"></i>
          </button>
        </div>
        <p class="mt-2 text-[10px] italic" style="color:#444;">
          Get your key from
          <a href="https://aistudio.google.com/app/apikey" target="_blank"
            class="text-accent underline underline-offset-2">
            Google AI Studio
          </a>.
        </p>
      </div>

      <!-- Model Select -->
      <div>
        <label for="modelSelect"
          class="block text-[10px] font-bold uppercase tracking-[0.15em] mb-1.5"
          style="color:#555;">
          AI Model
        </label>
        <select id="modelSelect"
          class="w-full rounded-lg px-3 py-2.5 text-sm focus-ring"
          style="background:#161616;border:1px solid #242424;color:#f0f0f0;">
          <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash — Hybrid Reasoning</option>
          <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite — Cost Effective</option>
          <option value="gemini-2.5-flash-lite-preview-09-2025">Gemini 2.5 Flash-Lite Preview — High Throughput</option>
        </select>
        <p class="mt-1.5 text-[10px]" style="color:#444;">
          Using latest Gemini 2.5 family for optimal performance.
        </p>
      </div>

      <!-- Save Button -->
      <button id="saveSettingsBtn"
        class="btn-accent w-full py-3 rounded-xl text-xs font-black flex items-center justify-center gap-2 uppercase tracking-[0.15em] mt-2">
        <i data-lucide="save" class="w-4 h-4"></i> Save Settings
      </button>
    </div>
  </div>

  <!-- Dynamic Theme / Accent Color Card -->
  <div class="card p-5">
    <h2 class="text-[11px] font-bold uppercase tracking-[0.15em] flex items-center gap-2 mb-5"
      style="color:#888;">
      <i data-lucide="palette" class="w-3 h-3 text-accent"></i> Design & Accents
    </h2>

    <div class="space-y-4">
      <div>
        <label class="block text-[10px] font-bold uppercase tracking-[0.15em] mb-2.5"
          style="color:#555;">
          Accent Color Presets
        </label>
        <div class="flex flex-wrap gap-3">
          <!-- Default Violet -->
          <button class="accent-picker w-8 h-8 rounded-full border-2 border-transparent transition-all hover:scale-110"
            data-accent="violet" title="Default Violet"
            style="background:#8b5cf6;">
          </button>
          <!-- Pantone 2026: Cotton Seed -->
          <button class="accent-picker w-8 h-8 rounded-full border-2 border-transparent transition-all hover:scale-110"
            data-accent="pantone-2026" title="Pantone 2026: Cotton Seed"
            style="background:#f0efeb;">
          </button>
          <!-- Pantone 2025: Mocha Mousse -->
          <button class="accent-picker w-8 h-8 rounded-full border-2 border-transparent transition-all hover:scale-110"
            data-accent="mocha-mousse" title="Pantone 2025: Mocha Mousse"
            style="background:#a47764;">
          </button>
          <!-- Pantone 2024: Peach Fuzz -->
          <button class="accent-picker w-8 h-8 rounded-full border-2 border-transparent transition-all hover:scale-110"
            data-accent="peach-fuzz" title="Pantone 2024: Peach Fuzz"
            style="background:#febe98;">
          </button>
        </div>
        <p class="mt-2 text-[10px]" style="color:#444;">
          Featuring Pantone Colors of the Year (2024-2026).
        </p>
      </div>
    </div>
  </div>

  <!-- Extension Status Card -->
  <div class="p-4 rounded-xl" style="background:#0a0a0a;border:1px solid #1a1a1a;">
    <h2 class="text-[10px] font-bold uppercase tracking-[0.18em] mb-3 flex items-center gap-2" style="color:#444;">
      <i data-lucide="info" class="w-3 h-3"></i> Extension Status
    </h2>
    <div class="space-y-2.5">
      <div class="flex justify-between items-center text-xs">
        <span style="color:#555;">Bookmarks tracked</span>
        <span id="bookmarkCount" class="font-mono font-bold" style="color:#f0f0f0;">—</span>
      </div>
      <div class="flex justify-between items-center text-xs">
        <span style="color:#555;">Storage used</span>
        <span id="storageUsed" class="font-mono font-bold" style="color:#f0f0f0;">— KB</span>
      </div>
    </div>
  </div>

  <!-- Footer Section -->
  <footer class="mt-8 pt-6 border-t border-[#1a1a1a] pb-4">
    <div class="flex flex-col items-center justify-center space-y-4 text-center">
      <div class="flex items-center gap-4">
        <a href="https://github.com/SanekxArcs" target="_blank" 
           class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest text-[#555] hover:text-accent transition-colors">
          <i data-lucide="github" class="w-3.5 h-3.5"></i> SanekxArcs
        </a>
        <span class="w-1 h-1 rounded-full bg-[#222]"></span>
        <a href="mailto:oleksandr.dzisiak@gmail.com" 
           class="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest text-[#555] hover:text-accent transition-colors">
          <i data-lucide="mail" class="w-3.5 h-3.5"></i> Feedback
        </a>
      </div>
      
      <a href="https://www.paypal.com/paypalme/SanekxArcs" target="_blank" 
         class="flex items-center gap-2 px-4 py-2 rounded-lg bg-[#111] border border-[#222] text-[10px] font-bold uppercase tracking-widest text-[#888] hover:border-accent/30 hover:text-f0f0f0 transition-all group">
        <i data-lucide="heart" class="w-3.5 h-3.5 text-red-500/50 group-hover:text-red-500 transition-colors"></i>
        Support Project
      </a>
      
      <p class="text-[9px] uppercase tracking-[0.2em] text-[#333] pt-2">
        Bookmark Helper &copy; 2026
      </p>
    </div>
  </footer>

</section>
